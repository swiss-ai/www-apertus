name: FTP debug listing
on:
  workflow_dispatch:
jobs:
  list:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install lftp
        run: sudo apt-get -qq update && sudo apt-get -qq --yes install lftp
      - name: List sites directory
        env:
          FTP_HOST: ${{ secrets.DEPLOY_REMOTE_HOST }}
          FTP_USER: ${{ secrets.DEPLOY_REMOTE_USER }}
          FTP_PASS: ${{ secrets.DEPLOY_PRIVATE_KEY }}
        run: |
          lftp -e "
          set ssl:verify-certificate false;
          set net:max-retries 1;
          set net:timeout 15;
          open -u '$FTP_USER','$FTP_PASS' 'ftp://$FTP_HOST:21';
          echo '=== ls sites ==='; cls -la /sites/;
          echo '=== ls sites sub ==='; cls -l /sites/*/ | head -30;
          quit;
          " | sed -E 's#ftp://[^ ]*#[url-redacted]#g'
