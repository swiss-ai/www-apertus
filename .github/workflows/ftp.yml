# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content via FTP

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      sync:
        description: "File synchronization"
        required: true
        default: "delta"

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    name: "Deploy main"
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: "Confirm"
        run: "echo Uploading to ${{ secrets.DEPLOY_REMOTE_HOST }}"
      - name: "Deploy"
        uses: milanmk/actions-file-deployer@master
        with:
          remote-protocol: "ftp"
          remote-host: ${{ secrets.DEPLOY_REMOTE_HOST }}
          remote-user: ${{ secrets.DEPLOY_REMOTE_USER }}
          remote-password: ${{ secrets.DEPLOY_PRIVATE_KEY }}
          remote-port: 21
          remote-path: "/"
