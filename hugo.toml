baseURL = 'https://apertvs.ai/'
languageCode = 'en-us'
title = 'APERTVS.ai'
description = 'Fully Open Foundation Model for Sovereign AI'
contentDir = 'content'
enableEmoji = true

[caches]
  [caches.images]
    dir = ':cacheDir/images'

[module]
  [[module.imports]]
    path = "github.com/colinwilson/lotusdocs"
    disable = false
  [[module.imports]]
    path = "github.com/gohugoio/hugo-mod-bootstrap-scss/v5"
    disable = false

[markup]
  [markup.tableOfContents]
    endLevel = 2
    startLevel = 1
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true # https://jdhao.github.io/2019/12/29/hugo_html_not_shown/
  [markup.goldmark.parser]
    [markup.goldmark.parser.attribute]
      block = true

[params]
  description = 'Fully Open Foundation Model for Sovereign AI'
  author = 'Swiss AI Initiative'
  [params.social]
    github = 'swiss-ai'
  [params.footer]
    copyright = 'Swiss AI Initiative © 2026'
    version = false
  [params.docs]
    repoURL = 'https://github.com/swiss-ai/www-apertus'
    breadcrumbs = false
    darkMode = true
