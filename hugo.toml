baseURL = 'https://apertus-ai.org/'
languageCode = 'en'
title = 'Apertus'
contentDir = 'content'
enableEmoji = true

[caches]
    [caches.images]
        dir = ':cacheDir/images'

[module]
    [[module.imports]]
        path = "github.com/colinwilson/lotusdocs"
        disable = false
    [[module.imports]]
        path = "github.com/gohugoio/hugo-mod-bootstrap-scss/v5"
        disable = false

[markup]
    [markup.tableOfContents]
      endLevel = 2
      startLevel = 1
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true # https://jdhao.github.io/2019/12/29/hugo_html_not_shown/
  [markup.goldmark.parser]
    [markup.goldmark.parser.attribute]
      block = true

[params]
  [params.footer]
    copyright = "© 2026 [Swiss AI Initiative](https://www.swiss-ai.org/)"
    version = true
