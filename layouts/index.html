{{ define "main" }}
<style>
  body, #content, #home { margin: 0; padding: 0; }
  #hero { margin-top: 0; }
</style>
<main id="home">

  {{/* Hero */}}
  {{ partial "hero.html" . }}

  {{/* Navbar - fixed position on homepage, rendered after hero but appears at top due to position:fixed */}}
  {{ partial "navbar.html" (dict "showLogo" false "fixed" true) }}

  {{/* Page content */}}
  <section id="page-content" class="pt-0 pb-5 bg-white">
    <div class="container" style="max-width: 1100px;">
      {{ .Content }}
    </div>
  </section>

</main>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const nav = document.getElementById('main-nav');
  const heroLogo = document.querySelector('#hero img');

  function updateNav() {
    const heroLogoBottom = heroLogo ? heroLogo.getBoundingClientRect().bottom : 0;
    const scrolled = heroLogoBottom < 120;

    if (scrolled) {
      nav.classList.add('scrolled');
    } else {
      nav.classList.remove('scrolled');
    }
  }

  window.addEventListener('scroll', updateNav);
  updateNav();
});
</script>
{{ end }}
